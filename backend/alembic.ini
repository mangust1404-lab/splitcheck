[alembic]
# path to migration files
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
#file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to the `datetime.tz.tzname()` method of datetime.datetime.
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field that's auto-generated by Alembic
# (default: 40)
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# for root_config, the name of the file within the
# alembic directory from which to load .mako template overrides.
# can also be passed as the --template option to init and create.
# sqlalchemy_script_base = null

# for 'autoupgrade': direct the "initial" revision to begin
# with a blank slate (upgrading from schema version 0)
# initial_rev_id = null

[loggers]
keys = root,sqlalchemy.engine

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy.engine]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# the output encoding used when revision files
# are written from script.py.mako
# output_encoding = utf-8

# Commented out - database URL is provided by app.config.settings in env.py
# sqlalchemy.url = driver://user:password@localhost/dbname
