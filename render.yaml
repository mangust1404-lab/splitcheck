databases:
  - name: splitcheck-db
    plan: free
    databaseName: splitcheck
    user: splitcheck

services:
  - type: web
    name: splitcheck
    plan: free
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: splitcheck-db
          property: connectionString
      - key: BOT_TOKEN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        value: splitcheck-receipts
      - key: CORS_ORIGINS
        value: "https://web.telegram.org,https://telegram.org"
